<!-- Marteso inline wordmark v2 - monoline, matches the m icon.
     m mit 2% optischem Overshoot (Core). Geschlossene Scheiben a,o auf R=62 (leichter
     Undershoot, damit sie nicht massiver wirken als das offene m).
     Offene Buchstaben e,s auf voller Hoehe (wie m), fuer offene Innenraeume.
     e: Balken zentriert + duenner (30) -> offenes oberes Feld.
     t: dezentes Fuesschen (R34). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-18 -40 1187 243" role="img" aria-label="Marteso">
  <defs>
    <linearGradient id="grad" gradientUnits="userSpaceOnUse" x1="0" y1="-22" x2="1151" y2="185">
      <stop offset="0%" stop-color="#F95A1C"/>
      <stop offset="100%" stop-color="#DD3418"/>
    </linearGradient>
  </defs>
  <g fill="none" stroke="url(#grad)" stroke-width="40" stroke-linecap="round" stroke-linejoin="round">
    <!-- m (Core + 2% optischer Overshoot: bewusst geometrisch groesser, da das m sonst optisch am kleinsten wirkt; um Zentrum 112/98.5 skaliert, stroke 40.8) -->
    <path d="M 18.16 166.33 L 18.16 77.59 A 46.92 46.92 0 0 1 112 77.59 L 112 145.93" stroke-width="40.8"/>
    <path d="M 112 145.93 L 112 77.59 A 46.92 46.92 0 0 1 205.84 77.59 L 205.84 166.33" stroke-width="40.8"/>
    <!-- a (Scheibe R62, Undershoot; Stamm voll) -->
    <path d="M 327 36.5 A 62 62 0 1 1 327 160.5 A 62 62 0 1 1 327 36.5 Z"/>
    <path d="M 389 32 L 389 165"/>
    <!-- r -->
    <path d="M 454 165 L 454 32"/>
    <path d="M 454 78 A 46 46 0 0 1 500 32"/>
    <!-- t -->
    <path d="M 584 -2 L 584 131 A 34 34 0 0 0 618 165"/>
    <path d="M 558 32 L 614 32"/>
    <!-- e (volle Hoehe R66.5; Balken zentriert, 30; Schale endet bei -6deg + Balken bis 815 -> buendige Verbindung ohne Ueberhang) -->
    <path d="M 789 147.92 A 66.5 66.5 0 1 1 810.64 91.55"/>
    <path d="M 815 98.5 L 678 98.5" stroke-width="30"/>
    <!-- s (volle Hoehe; horizontal +20% verbreitert -> rx48 ry33, Endpunkte um Mitte 909 skaliert) -->
    <path d="M 957 65.5 A 48 33 0 1 0 909 98.5 A 48 33 0 1 1 861 131.5"/>
    <!-- o (Scheibe R62, Undershoot) -->
    <path d="M 1069 36.5 A 62 62 0 1 1 1069 160.5 A 62 62 0 1 1 1069 36.5 Z"/>
  </g>
</svg>
